{% extends "base.html" %}
{% block title %}VLESS Manager — Logs{% endblock %}
{% block page_title %}Logs{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='logs.css') }}">
{% endblock %}
{% block content %}

<div class="toolbar">
  <select id="logLevelFilter" class="select-filter" onchange="setLevel(this.value)">
    <option value="">All</option>
    <option value="DEBUG">DEBUG</option>
    <option value="INFO">INFO</option>
    <option value="WARN">WARN</option>
    <option value="ERROR">ERROR</option>
  </select>
  <button class="btn" onclick="clearLogs()">Clear</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr><th>Time</th><th>Level</th><th>Message</th></tr>
    </thead>
    <tbody id="logBody"></tbody>
  </table>
  <div class="pagination-bar" id="logPagination" style="display:none">
    <button class="btn" id="logShowMoreBtn" onclick="loadMore()">Show next 50</button>
    <span class="pagination-info" id="logPaginationInfo"></span>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='logs.js') }}"></script>
{% endblock %}
